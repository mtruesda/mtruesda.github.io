name: CI & Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Pages needs these permissions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  BUILD_DIR: Website/dist

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (cache for both subprojects)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Website/package-lock.json

      - name: Install Website deps
        working-directory: Website
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm i; fi

      - name: Build website
        working-directory: Website
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_STEAM_ID: ${{ secrets.VITE_STEAM_ID }}
        run: |
          npm run build

      # Package the built static site for Pages
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # SPA fallback so react-router routes don't 404 on direct load
      - name: Create 404.html SPA fallback
        working-directory: Website/dist
        run: cp index.html 404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
